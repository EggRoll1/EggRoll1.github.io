<!DOCTYPE html>
<meta name="viewport" content="width=device-width, initial-scale=1">
<html>
<title>Home</title>
<link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
<head>
<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto&family=Yusei+Magic&display=swap');
p {
	font-family: 'Roboto', sans-serif;
	color: white;
}
h1 {
	font-family: 'Yusei Magic', sans-serif;
	color: white;
}
body {
	background-color: black;
	background-repeat: no-repeat;
	background-color: #000;
}
header {
	height: 100%;
	background: url('/img/space-bg.png') bottom no-repeat transparent;
	background-size: cover;
}
header {
	position: fixed;
	display: block;
	width: 100%;
	height: 75%;
	top: 0;
	left: 0;
	z-index: 9%;
}
footer#footer {
	background-image: url(/img/moon.png);
	background-position: center center;
	background-repeat: no-repeat;
	background-size: cover;
}
#footer-logo {
	display: block;
	margin-left: auto;
	margin-right: auto;
	width: 50%;
	}
</style>
</head>
<body>

<header class="header">
<div class="w3-display-middle">
	<div class="w3-container w3-center w3-animate-top" >
		<h1>Hi!</h1>
		<hr class="w3-border-grey" style="margin:auto;width:40%">
		<p class="w3-large w3-center"><img src="/img/arrow-down.svg"></p>
	</div>
</div>
</header>
<footer id="footer">
	<div class="footer-logo">
		<img src="/img/logo.png">
	</div>
</footer>
</body>
</html>
