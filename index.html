<!DOCTYPE html>
<meta name="viewport" content="width=device-width, initial-scale=1">
<html>
<title>Home</title>
<link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
<head>
<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto&family=Yusei+Magic&display=swap');
p {
	font-family: 'Roboto', sans-serif;
	color: white;
}
h1 {
	font-family: 'Yusei Magic', sans-serif;
	color: white;
}
body {
	background-color: black;
	background-repeat: no-repeat;
	background-color: #000;
}
header {
	height: 100%;
	background: url('/img/space-bg.png') bottom no-repeat transparent;
	background-size: cover;
	position: fixed;
	display: block;
	width: 100%;
	height: 75%;
	top: 0;
	left: 0;
	z-index: 9%;
}

#footer {
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    width:100%;
    height:100px;
}

#footerContainer {
    position:relative;
    width:100%;
    height:100px;
}

#imginthefooter {       
    background: url(img/moon.png) no-repeat;
    width:100px;
    height:300px;
    top: -108px;  /* Position element */
    right: 150px; /* Position element */ 
    position: absolute;
}
</style>
</head>
<body>
<header>
<div class="w3-display-middle">
	<div class="w3-container w3-center w3-animate-top" >
		<h1>Hi!</h1>
		<hr class="w3-border-grey" style="margin:auto;width:40%">
		<p class="w3-large w3-center"><img src="/img/arrow-down.svg"></p>
	</div>
</div>
</header>

<div id="footer">
  <div id="footerContainer">
    <div id="imginthefooter"></div>

    . . . Any additional footer elements go here . . .

  </div>
</div>

</body>
</html>
